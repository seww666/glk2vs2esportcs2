<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турнір 2 на 2 GLK</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #3b4252;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: #e5e9f0;
            color: #2e3440;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .admin-panel-btn {
            background-color: #88c0d0;
            color: #2e3440;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .admin-panel-btn:hover {
            background-color: #81a1c1;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .photo-placeholder {
            width: 100%;
            max-width: 700px;
            height: 400px;
            background-color: #d8dee9;
            color: #2e3440;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            border-radius: 4px;
            margin-bottom: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .photo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            position: absolute;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            display: none;
        }

        .photo-placeholder:hover .upload-btn {
            display: block;
        }

        #file-input {
            display: none;
        }

        .submit-app-btn {
            background-color: #d8dee9;
            color: #2e3440;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .submit-app-btn:hover {
            background-color: #e5e9f0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background-color: #2e3440;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #88c0d0;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #d8dee9;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #4c566a;
            background-color: #3b4252;
            color: #fff;
            border-radius: 4px;
        }

        .form-btn {
            width: 100%;
            padding: 12px;
            background-color: #a3be8c;
            color: #2e3440;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-section {
            display: none;
            width: 100%;
            max-width: 700px;
            background-color: #2e3440;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .admin-section h2 {
            color: #81a1c1;
            margin-bottom: 15px;
            border-bottom: 2px solid #4c566a;
            padding-bottom: 10px;
        }

        .application-item {
            background-color: #3b4252;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .app-actions button {
            padding: 6px 12px;
            margin-left: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .accept-btn { background-color: #a3be8c; color: #2e3440; }
        .reject-btn { background-color: #bf616a; color: #fff; }
        
        .status-badge {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .status-accepted { color: #a3be8c; }
        .status-rejected { color: #bf616a; }
    </style>
</head>
<body>

    <header>
        <div id="site-title">2/2 GLK HLTV VALVE</div>
        <button class="admin-panel-btn" id="auth-action-btn" onclick="openLoginModal()">Вхід для Адміна</button>
    </header>

    <div class="main-container">
        <div class="photo-placeholder" id="banner-zone">
            <span id="placeholder-text">Завантаження фото...</span>
            <img id="banner-img" src="" alt="" style="display: none;">
            <label for="file-input" class="upload-btn" id="upload-label">Змінити фото</label>
            <input type="file" id="file-input" accept="image/*" onchange="uploadPhoto(event)">
        </div>

        <button class="submit-app-btn" onclick="openAppModal()">Подати заявку</button>

        <div class="admin-section" id="admin-panel">
            <h2>Список заявок (Адмін-панель)</h2>
            <div id="applications-container"></div>
        </div>
    </div>

    <div class="modal" id="login-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('login-modal')">&times;</span>
            <h3>Авторизація</h3>
            <input type="text" id="admin-login" placeholder="Логін">
            <input type="password" id="admin-pass" placeholder="Пароль">
            <button class="form-btn" onclick="loginAdmin()">Увійти</button>
        </div>
    </div>

    <div class="modal" id="app-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('app-modal')">&times;</span>
            <h3>Подати заявку на турнір</h3>
            <p style="margin-bottom: 10px; font-size: 0.9rem; color: #88c0d0;">Заповніть нікнейми обох учасників:</p>
            <input type="text" id="player1-nickname" placeholder="Ваш нікнейм">
            <input type="text" id="player2-nickname" placeholder="Нікнейм тімейта">
            <button class="form-btn" onclick="submitApplication()">Надіслати команду</button>
        </div>
    </div>

    <script>
        // !!! ЗАМІНИ ЦІ ДАНІ НА СВОЇ З FIREBASE !!!
        const firebaseConfig = {
            apiKey: "ТВІЙ_API_KEY",
            authDomain: "ТВІЙ_AUTH_DOMAIN",
            databaseURL: "ТВІЙ_DATABASE_URL",
            projectId: "ТВІЙ_PROJECT_ID",
            storageBucket: "ТВІЙ_STORAGE_BUCKET",
            messagingSenderId: "ТВІЙ_MESSAGING_SENDER_ID",
            appId: "ТВІЙ_APP_ID"
        };
        
        // Ініціалізація баз даних
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Стан адміна залишаємо локальним (щоб звичайні люди не бачили адмінку)
        let isAdmin = localStorage.getItem('isAdmin') === 'true';

        window.onload = function() {
            checkAdminStatus();
            listenToBannerPhoto();
            listenToApplications();
        };

        function openLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
        function openAppModal() { document.getElementById('app-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkAdminStatus() {
            const authBtn = document.getElementById('auth-action-btn');
            const adminPanel = document.getElementById('admin-panel');
            const uploadLabel = document.getElementById('upload-label');

            if (isAdmin) {
                authBtn.innerText = "Вийти (Адмін)";
                authBtn.onclick = logoutAdmin;
                adminPanel.style.display = "block";
                uploadLabel.style.display = "block";
            } else {
                authBtn.innerText = "Вхід для Адміна";
                authBtn.onclick = openLoginModal;
                adminPanel.style.display = "none";
                uploadLabel.style.display = "none";
            }
        }

        function loginAdmin() {
            const login = document.getElementById('admin-login').value;
            const pass = document.getElementById('admin-pass').value;

            if (login === "123" && pass === "admin123") {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                closeModal('login-modal');
                checkAdminStatus();
            } else {
                alert("Неправильний логін або пароль!");
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            localStorage.setItem('isAdmin', 'false');
            checkAdminStatus();
        }

        // Оновлення фото ДЛЯ ВСІХ через сервер
        function uploadPhoto(event) {
            if (!isAdmin) return;
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    // Записуємо фото в глобальну базу
                    database.ref('bannerPhoto').set(base64Image);
                };
                reader.readAsDataURL(file);
            }
        }

        // Слухаємо базу даних: якщо фото зміниться на сервері — воно миттєво зміниться у всіх користувачів
        function listenToBannerPhoto() {
            database.ref('bannerPhoto').on('value', (snapshot) => {
                const src = snapshot.val();
                const img = document.getElementById('banner-img');
                const placeholderText = document.getElementById('placeholder-text');
                
                if (src) {
                    img.src = src;
                    img.style.display = 'block';
                    placeholderText.style.display = 'none';
                } else {
                    img.style.display = 'none';
                    placeholderText.innerText = "Вставте фото";
                    placeholderText.style.display = 'block';
                }
            });
        }

        document.getElementById('banner-zone').addEventListener('click', function(e) {
            if (isAdmin && e.target.id !== 'file-input' && e.target.id !== 'upload-label') {
                document.getElementById('file-input').click();
            }
        });

        // Надсилання команди в глобальну базу даних
        function submitApplication() {
            const p1 = document.getElementById('player1-nickname').value.trim();
            const p2 = document.getElementById('player2-nickname').value.trim();
            
            if (!p1 || !p2) {
                alert("Будь ласка, введіть нікнейми обох гравців!");
                return;
            }

            const newAppRef = database.ref('applications').push();
            newAppRef.set({
                id: newAppRef.key,
                player1: p1,
                player2: p2,
                status: 'pending'
            });
            
            document.getElementById('player1-nickname').value = '';
            document.getElementById('player2-nickname').value = '';
            closeModal('app-modal');
            alert("Заявку команди успішно надіслано на сервер!");
        }

        // Слухаємо заявки онлайн (синхронізація для адміна)
        function listenToApplications() {
            database.ref('applications').on('value', (snapshot) => {
                const container = document.getElementById('applications-container');
                container.innerHTML = '';
                const data = snapshot.val();

                if (!data) {
                    container.innerHTML = '<p style="color: #64748b;">Заявок поки немає.</p>';
                    return;
                }

                // Перетворюємо об'єкт бази в масив
                const apps = Object.values(data);

                apps.forEach(app => {
                    const item = document.createElement('div');
                    item.className = 'application-item';

                    let actionContent = '';
                    if (app.status === 'pending') {
                        actionContent = `
                            <div class="app-actions">
                                <button class="accept-btn" onclick="changeStatus('${app.id}', 'accepted')">Прийняти</button>
                                <button class="reject-btn" onclick="changeStatus('${app.id}', 'rejected')">Відхилити</button>
                            </div>
                        `;
                    } else if (app.status === 'accepted') {
                        actionContent = `<span class="status-badge status-accepted">Прийнято ✅</span>`;
                    } else {
                        actionContent = `<span class="status-badge status-rejected">Відхилено ❌</span>`;
                    }

                    item.innerHTML = `
                        <div class="team-info">
                            <div>👤 Гравці: <strong>${app.player1}</strong> & <strong>${app.player2}</strong></div>
                        </div>
                        ${actionContent}
                    `;
                    container.appendChild(item);
                });
            });
        }

        // Зміна статусу в базі даних (адмін приймає рішення)
        function changeStatus(id, newStatus) {
            database.ref('applications/' + id).update({
                status: newStatus
            });
        }
    </script>
</body>
</html>
