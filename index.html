<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackbox Minecraft Server Orchestrator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            color: #cdd6e0;
            font-family: 'Segoe UI', 'Roboto', monospace;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #141a22;
            border-radius: 28px;
            padding: 2.5rem 2.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 0 #2a333f;
            border: 1px solid #2a333f;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #f0f4fa;
            border-bottom: 1px solid #2a333f;
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 small {
            font-size: 0.9rem;
            color: #7a8a9e;
            font-weight: 400;
            margin-left: auto;
            background: #1e2835;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #2f3d4e;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .form-group {
            margin-bottom: 1.8rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8fa2b9;
            margin-bottom: 0.4rem;
        }
        select, input, textarea {
            width: 100%;
            background: #0f151e;
            border: 1px solid #2a333f;
            border-radius: 14px;
            padding: 0.75rem 1rem;
            color: #e6edf5;
            font-size: 0.95rem;
            font-family: inherit;
            transition: 0.2s;
            outline: none;
        }
        select:focus, input:focus, textarea:focus {
            border-color: #5b7b9e;
            box-shadow: 0 0 0 3px rgba(60, 130, 210, 0.2);
        }
        select option {
            background: #141a22;
        }
        .inline-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .inline-group .form-group {
            flex: 1;
            min-width: 120px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.3rem;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
            text-transform: none;
            font-size: 0.95rem;
            color: #bcc9db;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #3d7eb3;
        }
        .btn {
            background: #1f2b3a;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #eef4fc;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid #31415a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: #2b4b70;
            border-color: #3f6a97;
            box-shadow: 0 4px 12px rgba(40, 100, 200, 0.2);
        }
        .btn-primary:hover {
            background: #35628f;
            transform: scale(1.02);
            border-color: #5a8bc2;
        }
        .btn-success {
            background: #1d6b4a;
            border-color: #2b8f62;
        }
        .btn-success:hover {
            background: #268a5b;
        }
        .btn-danger {
            background: #6b2e3a;
            border-color: #914a5a;
        }
        .btn-danger:hover {
            background: #8a3d4d;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #252f3d;
        }
        .log-area {
            margin-top: 2rem;
            background: #0a0f16;
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #1f2937;
            max-height: 280px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #b3c7db;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-area .log-entry {
            border-bottom: 1px solid #18212b;
            padding: 0.2rem 0;
        }
        .log-area .log-entry .time {
            color: #5f7a96;
            margin-right: 1rem;
        }
        .badge {
            background: #1f2b3a;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #9bb0c9;
            border: 1px solid #2f4057;
        }
        .repo-config {
            background: #0e141d;
            border-radius: 16px;
            padding: 1.2rem;
            margin-top: 1.2rem;
            border: 1px solid #1e2939;
        }
        .repo-config input {
            background: #070b10;
        }
        .flex-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .flex-row .form-group {
            flex: 2;
            min-width: 200px;
        }
        .flex-row .btn {
            flex: 0 0 auto;
        }
        @media (max-width: 760px) {
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .container {
                padding: 1.5rem;
            }
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background: #3fcf8e; }
        .status-offline { background: #cf5a5a; }
        .status-pending { background: #e6b450; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        ⚡ Blackbox·Mine
        <small>оркестратор · v3.1</small>
    </h1>

    <div class="grid-2col">
        <!-- Левая колонка: версия и тип -->
        <div>
            <div class="form-group">
                <label for="mcVersion">Версия Minecraft</label>
                <select id="mcVersion">
                    <option value="1.21">1.21 (последняя)</option>
                    <option value="1.20.6">1.20.6</option>
                    <option value="1.20.4">1.20.4</option>
                    <option value="1.19.4">1.19.4</option>
                    <option value="1.18.2">1.18.2</option>
                    <option value="1.17.1">1.17.1</option>
                    <option value="1.16.5">1.16.5</option>
                    <option value="1.15.2">1.15.2</option>
                    <option value="1.14.4">1.14.4</option>
                    <option value="1.12.2">1.12.2</option>
                    <option value="1.11.2">1.11.2</option>
                    <option value="1.10.2">1.10.2</option>
                    <option value="1.9.4">1.9.4</option>
                    <option value="1.8.9">1.8.9</option>
                    <option value="1.7.10">1.7.10</option>
                </select>
            </div>
            <div class="form-group">
                <label for="serverType">Тип сервера</label>
                <select id="serverType">
                    <option value="vanilla">Vanilla (чистый)</option>
                    <option value="paper">Paper (оптимизированный)</option>
                    <option value="spigot">Spigot</option>
                    <option value="forge">Forge (моды)</option>
                    <option value="fabric">Fabric (моды)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="serverName">Название сервера (slug)</label>
                <input type="text" id="serverName" value="my-survival-01" placeholder="только латиница, цифры, -">
            </div>
        </div>

        <!-- Правая колонка: параметры -->
        <div>
            <div class="form-group">
                <label for="ramAlloc">Выделяемая RAM (МБ)</label>
                <input type="number" id="ramAlloc" value="2048" min="512" step="256">
            </div>
            <div class="inline-group">
                <div class="form-group">
                    <label for="serverPort">Порт</label>
                    <input type="number" id="serverPort" value="25565" min="1024" max="65535">
                </div>
                <div class="form-group">
                    <label for="maxPlayers">Макс. игроков</label>
                    <input type="number" id="maxPlayers" value="20" min="1" max="500">
                </div>
            </div>
            <div class="form-group">
                <label for="gameMode">Режим игры</label>
                <select id="gameMode">
                    <option value="survival">Выживание</option>
                    <option value="creative">Творческий</option>
                    <option value="adventure">Приключение</option>
                    <option value="spectator">Наблюдатель</option>
                </select>
            </div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="enablePvp" checked> PvP</label>
                <label><input type="checkbox" id="enableFlight" checked> Полёт</label>
                <label><input type="checkbox" id="enableCommandBlocks" checked> Командные блоки</label>
            </div>
        </div>
    </div>

    <!-- GitHub репозиторий -->
    <div class="repo-config">
        <div class="flex-row">
            <div class="form-group">
                <label for="githubRepo">Репозиторий GitHub (owner/repo)</label>
                <input type="text" id="githubRepo" value="yourname/mc-servers" placeholder="например: blackbox/minecraft-infra">
            </div>
            <div class="form-group">
                <label for="githubToken">GitHub Token (classic)</label>
                <input type="password" id="githubToken" placeholder="ghp_... или fine-grained">
            </div>
            <div class="form-group">
                <label for="configBranch">Ветка</label>
                <input type="text" id="configBranch" value="main">
            </div>
        </div>
        <div style="font-size:0.8rem; color:#6d7f95; margin-top: 6px;">
            🔐 Токен хранится только в sessionStorage, не передаётся на сторонние серверы.
        </div>
    </div>

    <!-- Действия -->
    <div class="actions">
        <button class="btn btn-primary" id="deployBtn">🚀 Развернуть сервер</button>
        <button class="btn btn-success" id="saveToGitBtn">💾 Сохранить конфиг в GitHub</button>
        <button class="btn" id="previewBtn">📄 Показать server.properties</button>
        <button class="btn btn-danger" id="clearLogBtn">🗑️ Очистить лог</button>
        <span style="margin-left:auto; display:flex; align-items:center; gap:10px;">
            <span class="status-indicator status-offline" id="statusLight"></span>
            <span id="statusText" style="color:#8fa2b9;">неактивен</span>
        </span>
    </div>

    <!-- Лог -->
    <div class="log-area" id="logArea">
        <div class="log-entry"><span class="time">[system]</span> Инициализация оркестратора Blackbox Research</div>
        <div class="log-entry"><span class="time">[system]</span> Ожидание команд...</div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const logArea = document.getElementById('logArea');
        const statusLight = document.getElementById('statusLight');
        const statusText = document.getElementById('statusText');

        // DOM-поля
        const mcVersion = document.getElementById('mcVersion');
        const serverType = document.getElementById('serverType');
        const serverName = document.getElementById('serverName');
        const ramAlloc = document.getElementById('ramAlloc');
        const serverPort = document.getElementById('serverPort');
        const maxPlayers = document.getElementById('maxPlayers');
        const gameMode = document.getElementById('gameMode');
        const enablePvp = document.getElementById('enablePvp');
        const enableFlight = document.getElementById('enableFlight');
        const enableCommandBlocks = document.getElementById('enableCommandBlocks');
        const githubRepo = document.getElementById('githubRepo');
        const githubToken = document.getElementById('githubToken');
        const configBranch = document.getElementById('configBranch');

        // Кнопки
        const deployBtn = document.getElementById('deployBtn');
        const saveToGitBtn = document.getElementById('saveToGitBtn');
        const previewBtn = document.getElementById('previewBtn');
        const clearLogBtn = document.getElementById('clearLogBtn');

        // --- Вспомогательные функции ---
        function getTimestamp() {
            return new Date().toLocaleTimeString('ru-RU', { hour12: false });
        }

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = getTimestamp();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warn' ? '⚠️' : 'ℹ️';
            entry.innerHTML = `<span class="time">[${time}]</span> ${prefix} ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function setStatus(state, text) {
            statusLight.className = 'status-indicator';
            if (state === 'online') {
                statusLight.classList.add('status-online');
                statusText.textContent = text || 'онлайн';
            } else if (state === 'pending') {
                statusLight.classList.add('status-pending');
                statusText.textContent = text || 'в процессе...';
            } else {
                statusLight.classList.add('status-offline');
                statusText.textContent = text || 'офлайн';
            }
        }

        // --- Генерация server.properties ---
        function generateServerProperties() {
            const version = mcVersion.value;
            const type = serverType.value;
            const name = serverName.value.trim() || 'unnamed-server';
            const ram = parseInt(ramAlloc.value) || 2048;
            const port = parseInt(serverPort.value) || 25565;
            const maxP = parseInt(maxPlayers.value) || 20;
            const mode = gameMode.value;
            const pvp = enablePvp.checked ? 'true' : 'false';
            const flight = enableFlight.checked ? 'true' : 'false';
            const cmdBlocks = enableCommandBlocks.checked ? 'true' : 'false';

            // Формируем конфиг как объект
            const props = {
                '#Minecraft server properties': '',
                'generated_by': 'Blackbox-Orchestrator v3.1',
                'version': version,
                'server_type': type,
                'server_name': name,
                'ram_mb': ram,
                'server_port': port,
                'max_players': maxP,
                'gamemode': mode,
                'pvp': pvp,
                'allow_flight': flight,
                'enable_command_block': cmdBlocks,
                'motd': `§a${name} §6| §b${version} §7| §fBlackbox`,
                'level_seed': Math.floor(Math.random() * 1000000000),
                'view_distance': 10,
                'simulation_distance': 8,
                'spawn_protection': 16,
                'max_tick_time': 60000,
                'network_compression_threshold': 256,
                'use_native_transport': 'true',
                'enable_status': 'true',
                'enable_query': 'false',
                'enable_rcon': 'false',
                'rcon_port': 25575,
                'broadcast_rcon_to_ops': 'true',
                'sync_chunk_writes': 'true',
                'prevent_proxy_connections': 'false',
                'hide_online_players': 'false',
                'player_idle_timeout': 0,
                'entity_broadcast_range_percentage': 100,
                'function_permission_level': 2,
                'op_permission_level': 4,
                'level_type': 'default',
                'generator_settings': '{}',
                'allow_nether': 'true',
                'allow_end': 'true',
                'allow_animals': 'true',
                'allow_monsters': 'true',
                'hardcore': 'false',
                'spawn_animals': 'true',
                'spawn_monsters': 'true',
                'spawn_npcs': 'true',
                'spawn_peaceful_mobs': 'true',
                'announce_player_achievements': 'true',
                'enable_autosave': 'true',
                'force_gamemode': 'false',
                'max_build_height': 320,
                'max_world_size': 29999984,
                'seed': '',
                'level_name': `world_${name}`,
                'level_seed': Math.floor(Math.random() * 1000000000)
            };

            // Сборка в строку
            let lines = [];
            for (const [key, val] of Object.entries(props)) {
                if (key.startsWith('#')) {
                    lines.push(key);
                } else {
                    lines.push(`${key}=${val}`);
                }
            }
            return lines.join('\n');
        }

        // --- Сборка полного манифеста ---
        function buildDeploymentManifest() {
            const name = serverName.value.trim() || 'server-' + Date.now();
            const version = mcVersion.value;
            const type = serverType.value;
            const ram = parseInt(ramAlloc.value) || 2048;
            const port = parseInt(serverPort.value) || 25565;
            const maxP = parseInt(maxPlayers.value) || 20;
            const mode = gameMode.value;

            return {
                serverName: name,
                minecraftVersion: version,
                serverType: type,
                ramMB: ram,
                port: port,
                maxPlayers: maxP,
                gameMode: mode,
                pvp: enablePvp.checked,
                allowFlight: enableFlight.checked,
                commandBlocks: enableCommandBlocks.checked,
                properties: generateServerProperties(),
                timestamp: new Date().toISOString(),
                deployTarget: 'blackbox-orchestrator',
                repository: githubRepo.value.trim() || 'unknown/repo',
                branch: configBranch.value.trim() || 'main'
            };
        }

        // --- Эмуляция деплоя на удалённый сервер ---
        function simulateDeploy(manifest) {
            setStatus('pending', 'деплой...');
            addLog(`Начат деплой сервера "${manifest.serverName}" (${manifest.minecraftVersion}, ${manifest.serverType})`, 'info');

            return new Promise((resolve) => {
                const delay = 1800 + Math.random() * 1200;
                setTimeout(() => {
                    const success = Math.random() > 0.08; // 92% успеха
                    if (success) {
                        const ip = `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
                        const assignedPort = manifest.port;
                        addLog(`✅ Сервер успешно развёрнут на ${ip}:${assignedPort} | RAM: ${manifest.ramMB}МБ`, 'success');
                        addLog(`📁 Конфиг сохранён в /opt/minecraft/${manifest.serverName}/server.properties`, 'info');
                        setStatus('online', `активен (${ip})`);
                        resolve({ success: true, ip, port: assignedPort });
                    } else {
                        addLog(`❌ Ошибка деплоя: таймаут соединения с узлом #${Math.floor(Math.random()*5)+1}`, 'error');
                        setStatus('offline', 'ошибка деплоя');
                        resolve({ success: false, error: 'deploy_timeout' });
                    }
                }, delay);
            });
        }

        // --- Сохранение в GitHub через API ---
        async function saveToGitHub(manifest) {
            const repo = githubRepo.value.trim();
            const token = githubToken.value.trim();
            const branch = configBranch.value.trim() || 'main';

            if (!repo || !token) {
                addLog('⚠️ Не указан репозиторий или токен GitHub', 'warn');
                return false;
            }

            const path = `servers/${manifest.serverName}/server.properties`;
            const content = btoa(unescape(encodeURIComponent(manifest.properties))); // Base64
            const url = `https://api.github.com/repos/${repo}/contents/${path}`;

            try {
                addLog(`⏳ Отправка конфига в ${repo}:${branch} ...`, 'info');
                // Сначала пробуем получить файл (для получения sha)
                let sha = null;
                try {
                    const getResp = await fetch(url, {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
                    });
                    if (getResp.ok) {
                        const data = await getResp.json();
                        sha = data.sha;
                    }
                } catch (e) { /* файл не существует */ }

                const payload = {
                    message: `Обновление конфига для ${manifest.serverName} от ${new Date().toISOString()}`,
                    content: content,
                    branch: branch,
                    sha: sha || undefined
                };

                const method = sha ? 'PUT' : 'PUT';
                const resp = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (resp.ok) {
                    addLog(`✅ Конфигурация сохранена в GitHub: ${repo}/${path}`, 'success');
                    return true;
                } else {
                    const errText = await resp.text();
                    addLog(`❌ Ошибка GitHub: ${resp.status} ${errText.substring(0, 120)}`, 'error');
                    return false;
                }
            } catch (err) {
                addLog(`❌ Исключение при сохранении в GitHub: ${err.message}`, 'error');
                return false;
            }
        }

        // --- Обработчики ---

        // Деплой
        deployBtn.addEventListener('click', async function() {
            const manifest = buildDeploymentManifest();
            addLog(`🚀 Запуск деплоя для "${manifest.serverName}" (версия ${manifest.minecraftVersion})`, 'info');
            const result = await simulateDeploy(manifest);
            if (result.success) {
                // Пробуем сохранить в GitHub автоматически, если есть токен
                if (githubToken.value.trim() && githubRepo.value.trim()) {
                    await saveToGitHub(manifest);
                }
            }
        });

        // Сохранить в GitHub вручную
        saveToGitBtn.addEventListener('click', async function() {
            const manifest = buildDeploymentManifest();
            await saveToGitHub(manifest);
        });

        // Превью server.properties
        previewBtn.addEventListener('click', function() {
            const props = generateServerProperties();
            addLog(`📄 server.properties:\n${props}`, 'info');
        });

        // Очистка лога
        clearLogBtn.addEventListener('click', function() {
            logArea.innerHTML = '';
            addLog('Лог очищен', 'info');
        });

        // Восстановление токена из sessionStorage
        if (sessionStorage.getItem('github_token')) {
            githubToken.value = sessionStorage.getItem('github_token');
        }
        // Сохраняем токен при вводе
        githubToken.addEventListener('change', function() {
            if (this.value) {
                sessionStorage.setItem('github_token', this.value);
            } else {
                sessionStorage.removeItem('github_token');
            }
        });

        // Стартовое сообщение
        addLog('🟢 Оркестратор готов. Используйте "Развернуть сервер" для запуска.', 'success');
        setStatus('offline', 'ожидание команды');

        // Экспорт для консоли (отладка)
        window.__blackbox = { buildDeploymentManifest, generateServerProperties, saveToGitHub };

        console.log('[Blackbox] Minecraft Orchestrator loaded. Use __blackbox for internals.');
    })();
</script>
</body>
</html>
